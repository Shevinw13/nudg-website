  <text x="56" y="658" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">👤</text>
  <text x="82" y="646" fill="#0B1D3A" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Rachel Kim</text>
  <text x="82" y="666" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="12">★★★★★</text>
  <text x="330" y="654" text-anchor="end" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">2h ago</text>

  <!-- Activity item 3 (partial) -->
  <rect x="24" y="696" width="327" height="44" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>
  <circle cx="56" cy="718" r="16" fill="#F3F4F6"/>
  <text x="56" y="722" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">👤</text>
  <text x="82" y="722" fill="#0B1D3A" font-family="system-ui, sans-serif" font-size="13" font-weight="500">David Chen</text>

  <!-- Bottom tab bar -->
