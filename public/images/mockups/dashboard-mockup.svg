  <text x="24" y="118" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">Summit Plumbing</text>
  <!-- Nudgli logo icon (top right) -->
  <rect x="325" y="80" width="32" height="32" rx="8" fill="#0CBFA6"/>
  <path d="M335 98c0-3 2-5 5-6v-2l6 5-6 5v-3c-2 0-4 1-5 4v-1c0-1 0-2 0-2z" fill="white"/>

  <!-- White content area -->
  <rect y="144" width="375" height="668" rx="20" fill="#FFFFFF"/>

