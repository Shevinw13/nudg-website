  <circle cx="167" cy="346" r="12" fill="#FEF3C7"/>
  <text x="167" y="351" text-anchor="middle" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">!</text>
  <text x="155" y="382" fill="#0B1D3A" font-family="system-ui, sans-serif" font-size="24" font-weight="bold">6</text>
  <text x="155" y="398" fill="#6B7280" font-family="system-ui, sans-serif" font-size="10">Needs</text>
  <text x="155" y="410" fill="#6B7280" font-family="system-ui, sans-serif" font-size="10">Follow-up</text>

