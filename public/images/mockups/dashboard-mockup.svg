  <!-- Stats row -->
  <!-- Positive Responses -->
  <rect x="24" y="320" width="105" height="100" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <circle cx="52" cy="346" r="12" fill="#DCFCE7"/>
  <path d="M47 346l3 3 5-5" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="40" y="382" fill="#0B1D3A" font-family="system-ui, sans-serif" font-size="24" font-weight="bold">34</text>
  <text x="40" y="398" fill="#6B7280" font-family="system-ui, sans-serif" font-size="10">Positive</text>
  <text x="40" y="410" fill="#6B7280" font-family="system-ui, sans-serif" font-size="10">Responses</text>

  <!-- Needs Follow-up -->
