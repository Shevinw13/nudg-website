<svg width="280" height="560" viewBox="0 0 280 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="280" height="560" fill="#FFFFFF"/>
  
  <!-- Status bar -->
  <rect width="280" height="44" fill="#0B1D3A"/>
  <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="white">9:41</text>
  <!-- No signal indicator -->
  <line x1="228" y1="26" x2="248" y2="18" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="228" y1="18" x2="248" y2="26" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
  <text x="210" y="28" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#EF4444">No Signal</text>
  
  <!-- Header -->
  <rect y="44" width="280" height="56" fill="#0B1D3A"/>
  <text x="20" y="78" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Send Request</text>
  <text x="20" y="94" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0CBFA6">Review request via SMS</text>
  
  <!-- Offline banner -->
  <rect x="16" y="116" width="248" height="52" rx="12" fill="#EFF6FF"/>
  <rect x="16" y="116" width="248" height="52" rx="12" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="36" cy="142" r="10" fill="#3B82F6"/>
  <!-- Cloud-off icon simplified -->
  <path d="M31 144 L41 138" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M33 140 C33 137 36 135 39 136" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <text x="52" y="138" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1E40AF">You're offline</text>
  <text x="52" y="156" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#3B82F6">Request will send automatically when back online.</text>
  
  <!-- Form fields -->
  <text x="20" y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B7280">CUSTOMER NAME</text>
  <rect x="16" y="206" width="248" height="44" rx="10" fill="#F2F4F7"/>
  <text x="28" y="233" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#0B1D3A">Mike Johnson</text>
  
  <text x="20" y="278" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B7280">PHONE NUMBER</text>
  <rect x="16" y="286" width="248" height="44" rx="10" fill="#F2F4F7"/>
  <text x="28" y="313" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#0B1D3A">(555) 987-6543</text>
  
  <text x="20" y="358" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B7280">SERVICE TYPE (OPTIONAL)</text>
  <rect x="16" y="366" width="248" height="44" rx="10" fill="#F2F4F7"/>
  <text x="28" y="393" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#0B1D3A">AC Installation</text>
  
  <!-- Send button -->
  <rect x="16" y="438" width="248" height="48" rx="14" fill="#0CBFA6"/>
  <text x="140" y="467" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Queue &amp; Send When Online</text>
  
  <!-- Queued items indicator -->
  <rect x="16" y="506" width="248" height="40" rx="10" fill="#F2F4F7"/>
  <circle cx="36" cy="526" r="8" fill="#0CBFA6"/>
  <text x="33" y="530" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="white">2</text>
  <text x="52" y="530" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6B7280">requests queued for retry</text>
</svg>
