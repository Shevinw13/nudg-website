<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B1D3A"/>
  
  <!-- Subtle gradient overlay -->
  <rect width="1200" height="630" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0CBFA6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0B1D3A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- App icon -->
  <rect x="80" y="180" width="72" height="72" rx="16" fill="#0CBFA6"/>
  <path d="M104 216c0-5 3-8 8-10v-3l10 8-10 8v-5c-3 0-6 2-8 6v-2c0-1 0-2 0-2z" fill="white"/>
  
  <!-- Brand name -->
  <text x="170" y="235" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white">nudgli</text>
  
  <!-- Tagline -->
  <text x="80" y="320" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white">Your best customers want to help.</text>
  <text x="80" y="385" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#0CBFA6">They just need a nudge.</text>
  
  <!-- Subtitle -->
  <text x="80" y="450" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" fill="white" opacity="0.7">More 5-star Google reviews. Fewer public complaints.</text>
  <text x="80" y="485" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" fill="white" opacity="0.7">Built for local service businesses.</text>
  
  <!-- URL -->
  <text x="80" y="560" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#0CBFA6">nudgli.app</text>
  
  <!-- Decorative stars on right side -->
  <text x="950" y="250" font-family="system-ui" font-size="64" fill="#0CBFA6" opacity="0.8">★★★★★</text>
  
  <!-- Phone outline hint -->
  <rect x="980" y="300" width="140" height="280" rx="24" stroke="#0CBFA6" stroke-width="2" fill="none" opacity="0.3"/>
  <rect x="1020" y="320" width="60" height="8" rx="4" fill="#0CBFA6" opacity="0.2"/>
  <rect x="1000" y="345" width="100" height="60" rx="8" fill="#0CBFA6" opacity="0.15"/>
  <rect x="1000" y="415" width="100" height="20" rx="4" fill="#0CBFA6" opacity="0.1"/>
  <rect x="1000" y="445" width="100" height="20" rx="4" fill="#0CBFA6" opacity="0.1"/>
</svg>
